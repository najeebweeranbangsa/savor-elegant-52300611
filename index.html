    <script>
      // Hide chat widget and Elfsight on admin pages
      (function() {
        function toggleWidgets() {
          var isAdmin = window.location.pathname.startsWith('/admin');
          var style = document.getElementById('hide-widgets-admin');
          if (isAdmin && !style) {
            style = document.createElement('style');
            style.id = 'hide-widgets-admin';
            style.textContent = '[class*="leadconnector"], iframe[src*="leadconnector"], .elfsight-app, [class*="chat-widget"] { display: none !important; }';
            document.head.appendChild(style);
          } else if (!isAdmin && style) {
            style.remove();
          }
        }
        toggleWidgets();
        var _pushState = history.pushState;
        var _replaceState = history.replaceState;
        history.pushState = function() { _pushState.apply(this, arguments); toggleWidgets(); };
        history.replaceState = function() { _replaceState.apply(this, arguments); toggleWidgets(); };
        window.addEventListener('popstate', toggleWidgets);
      })();
    </script>
